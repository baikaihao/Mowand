<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mowand 图标设计</title>
  <style>
    :root {
      color-scheme: light dark;
      --page: #f4f6f8;
      --ink: #17202a;
      --muted: #697386;
      --line: rgba(37, 48, 64, 0.13);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --cyan: #14b8d4;
      --blue: #246bfe;
      --violet: #8a5cff;
      --shadow: 0 18px 50px rgba(28, 38, 55, 0.13);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page: #11161d;
        --ink: #edf3fb;
        --muted: #a4adba;
        --line: rgba(226, 235, 247, 0.14);
        --panel: rgba(29, 37, 48, 0.74);
        --panel-strong: rgba(35, 44, 58, 0.92);
        --shadow: 0 20px 55px rgba(0, 0, 0, 0.36);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0) 42%),
        var(--page);
      color: var(--ink);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .page {
      width: min(1160px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 3.2vw, 44px);
      line-height: 1.08;
      font-weight: 760;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      max-width: 720px;
    }

    .status-pill {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      box-shadow: 0 0 12px rgba(20, 184, 212, 0.9);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(1.28);
      -webkit-backdrop-filter: blur(24px) saturate(1.28);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.24);
    }

    @media (prefers-color-scheme: dark) {
      .panel-header {
        background: rgba(255, 255, 255, 0.04);
      }
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .preview-stage {
      display: grid;
      place-items: center;
      min-height: 470px;
      padding: 38px 24px;
      background:
        linear-gradient(90deg, rgba(120, 132, 152, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(120, 132, 152, 0.08) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .app-icon-wrap {
      width: min(330px, 78vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 24px 32px rgba(16, 28, 46, 0.2));
    }

    .icon-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .resource-list {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .resource {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-strong);
    }

    .resource-thumb {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.18));
      border: 1px solid var(--line);
    }

    @media (prefers-color-scheme: dark) {
      .resource-thumb {
        background: rgba(255, 255, 255, 0.05);
      }
    }

    .resource h3 {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.2;
    }

    .resource p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.58);
      color: var(--ink);
      cursor: pointer;
    }

    .btn:hover {
      border-color: rgba(36, 107, 254, 0.45);
      background: rgba(36, 107, 254, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      .btn {
        background: rgba(255, 255, 255, 0.06);
      }
    }

    .strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .size-cell {
      min-height: 112px;
      display: grid;
      place-items: center;
      gap: 8px;
      align-content: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-strong);
    }

    .size-caption {
      color: var(--muted);
      font-size: 12px;
    }

    .notes {
      padding: 16px 18px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .notes strong {
      color: var(--ink);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--ink);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 850px) {
      .page {
        width: min(100vw - 24px, 680px);
        padding-top: 22px;
      }

      .topbar,
      .grid {
        display: block;
      }

      .status-pill {
        margin-top: 14px;
      }

      .panel {
        margin-top: 14px;
      }

      .preview-stage {
        min-height: 360px;
      }

      .strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="title-block">
        <h1>Mowand 图标设计</h1>
        <p class="subtitle">App 图标采用银白玻璃、蓝青色手势光轨和指针形魔杖顶端；菜单栏图标沿用现有方案，这里只保留 App 图标设计与导出。</p>
      </div>
      <div class="status-pill"><span class="status-dot"></span>App Icon</div>
    </header>

    <section class="grid" aria-label="Mowand icon design board">
      <article class="panel">
        <div class="panel-header">
          <div>
            <h2>App 图标</h2>
            <div class="label">玻璃底座、魔杖主体、指针形杖尖、八方向手势轨迹</div>
          </div>
          <button class="btn" data-copy="app-icon-svg">复制 SVG</button>
        </div>
        <div class="preview-stage">
          <div class="app-icon-wrap" id="app-icon-preview"></div>
        </div>
        <div class="strip">
          <div class="size-cell"><div id="app-size-128" style="width:128px;height:128px"></div><span class="size-caption">128 px</span></div>
          <div class="size-cell"><div id="app-size-64" style="width:64px;height:64px"></div><span class="size-caption">64 px</span></div>
          <div class="size-cell"><div id="app-size-32" style="width:32px;height:32px"></div><span class="size-caption">32 px</span></div>
          <div class="size-cell"><div id="app-size-16" style="width:16px;height:16px"></div><span class="size-caption">16 px</span></div>
        </div>
        <div class="notes">
          <strong>设计取向：</strong>主图标用于 Dock、Launchpad 和 GitHub 发布物料。顶部指针形缺口呼应鼠标手势工具，杆身环带表达能量绕行。
        </div>
      </article>

      <aside>
        <article class="panel">
          <div class="panel-header">
            <div>
              <h2>资源导出</h2>
              <div class="label">复制或下载独立 SVG</div>
            </div>
          </div>
          <div class="resource-list">
            <div class="resource">
              <div class="resource-thumb" id="resource-app"></div>
              <div>
                <h3>mowand-app-icon.svg</h3>
                <p>适合继续导出为 1024 px PNG 后放入 AppIcon.appiconset。</p>
                <div class="actions">
                  <button class="btn" data-copy="app-icon-svg">复制</button>
                  <button class="btn" data-download="app-icon-svg" data-filename="mowand-app-icon.svg">下载</button>
                </div>
              </div>
            </div>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="application/json" id="app-icon-svg">
  {
    "svg": "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024' role='img' aria-label='Mowand app icon'><defs><linearGradient id='bg' x1='145' y1='92' x2='878' y2='936' gradientUnits='userSpaceOnUse'><stop stop-color='#ffffff'/><stop offset='0.44' stop-color='#dcecff'/><stop offset='1' stop-color='#a8c9f4'/></linearGradient><radialGradient id='glow' cx='0' cy='0' r='1' gradientUnits='userSpaceOnUse' gradientTransform='translate(665 330) rotate(128) scale(680 560)'><stop stop-color='#5ef4ff' stop-opacity='0.78'/><stop offset='0.32' stop-color='#32c7ff' stop-opacity='0.48'/><stop offset='0.62' stop-color='#246bfe' stop-opacity='0.26'/><stop offset='0.86' stop-color='#5f7cff' stop-opacity='0.1'/><stop offset='1' stop-color='#8a5cff' stop-opacity='0'/></radialGradient><linearGradient id='wand' x1='302' y1='724' x2='653' y2='373' gradientUnits='userSpaceOnUse'><stop stop-color='#5f6f83'/><stop offset='0.38' stop-color='#edf7ff'/><stop offset='0.56' stop-color='#b8c8da'/><stop offset='1' stop-color='#ffffff'/></linearGradient><linearGradient id='pointer' x1='585' y1='255' x2='765' y2='410' gradientUnits='userSpaceOnUse'><stop stop-color='#ffffff'/><stop offset='0.42' stop-color='#c5fbff'/><stop offset='0.74' stop-color='#14b8d4'/><stop offset='1' stop-color='#246bfe'/></linearGradient><linearGradient id='trail' x1='221' y1='698' x2='724' y2='321' gradientUnits='userSpaceOnUse'><stop stop-color='#14b8d4'/><stop offset='0.6' stop-color='#246bfe'/><stop offset='1' stop-color='#8a5cff'/></linearGradient><filter id='softShadow' x='-70%' y='-70%' width='240%' height='240%' color-interpolation-filters='sRGB'><feDropShadow dx='0' dy='18' stdDeviation='24' flood-color='#1f2d46' flood-opacity='0.14'/><feDropShadow dx='0' dy='5' stdDeviation='8' flood-color='#1f2d46' flood-opacity='0.12'/></filter><filter id='lightBlur' x='-80%' y='-80%' width='260%' height='260%'><feGaussianBlur stdDeviation='13'/></filter></defs><rect x='0' y='0' width='1024' height='1024' fill='url(#bg)'/><rect x='0' y='0' width='1024' height='1024' fill='url(#glow)'/><g filter='url(#softShadow)' transform='translate(286 740) rotate(-45)'><path d='M0 0H496' stroke='#526172' stroke-width='70' stroke-linecap='round'/><path d='M0 0H496' stroke='url(#wand)' stroke-width='42' stroke-linecap='round'/><path d='M20 0H120' stroke='#ffffff' stroke-width='9' stroke-linecap='round' opacity='0.55'/><path d='M252 0H384' stroke='#ffffff' stroke-width='8' stroke-linecap='round' opacity='0.38'/><path d='M0 0H38' stroke='#6d7d91' stroke-width='44' stroke-linecap='round' opacity='0.7'/><path d='M22 0H72' stroke='#b8c8da' stroke-width='14' stroke-linecap='round' opacity='0.55'/><g transform='translate(421 0)' opacity='0.86'><rect x='-28' y='-14' width='56' height='28' rx='14' fill='#d8ecff' opacity='0.62'/><rect x='-23' y='-10' width='46' height='20' rx='10' fill='#14b8d4' opacity='0.58'/><rect x='-18' y='-7' width='36' height='14' rx='7' fill='#bff7ff' opacity='0.18'/><path d='M-10 -4H10' stroke='#ffffff' stroke-width='3' stroke-linecap='round' opacity='0.5'/></g><g transform='translate(458 0)'><path d='M-26 -34L66 -82Q78 -88 88 -78L198 -8Q212 0 198 8L88 78Q78 88 66 82L-26 34L24 0Z' fill='#526172'/><path d='M-11 -24L69 -65Q76 -69 83 -63L174 -5Q184 0 174 5L83 63Q76 69 69 65L-11 24L24 0Z' fill='url(#pointer)'/><path d='M60 -14L138 -14' stroke='#ffffff' stroke-width='8' stroke-linecap='round' opacity='0.48'/></g></g></svg>"
  }
  </script>

  <script>
    const parseSvg = (id) => JSON.parse(document.getElementById(id).textContent).svg;
    const svgs = {
      "app-icon-svg": parseSvg("app-icon-svg")
    };
    function mount(id, svg) {
      const target = document.getElementById(id);
      if (!target) return;
      target.innerHTML = svg;
      const child = target.querySelector("svg");
      if (child) child.classList.add("icon-svg");
    }

    ["app-icon-preview", "app-size-128", "app-size-64", "app-size-32", "app-size-16", "resource-app"].forEach((id) => {
      mount(id, svgs["app-icon-svg"]);
    });

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1700);
    }

    async function copySvg(id) {
      await navigator.clipboard.writeText(svgs[id]);
      showToast("SVG 已复制");
    }

    function downloadSvg(id, filename) {
      const blob = new Blob([svgs[id]], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("SVG 已下载");
    }

    document.addEventListener("click", (event) => {
      const copyButton = event.target.closest("[data-copy]");
      if (copyButton) {
        copySvg(copyButton.dataset.copy).catch(() => showToast("复制失败"));
        return;
      }

      const downloadButton = event.target.closest("[data-download]");
      if (downloadButton) {
        downloadSvg(downloadButton.dataset.download, downloadButton.dataset.filename);
      }
    });
  </script>
</body>
</html>
